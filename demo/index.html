<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alpine Virtual List Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.5;
        color: #172033;
        background: #f7f8fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 40px auto;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 2rem;
        line-height: 1.15;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 16px;
      }

      input {
        width: min(360px, 100%);
        border: 1px solid #c9d0dd;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      .count {
        color: #536178;
        font-size: 0.95rem;
      }

      .list {
        height: 520px;
        overflow-y: auto;
        border: 1px solid #ccd4e2;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgb(23 32 51 / 8%);
      }

      .row {
        display: grid;
        grid-template-columns: 88px 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 0 18px;
        border-bottom: 1px solid #edf0f5;
      }

      .row:nth-child(even) {
        background: #fbfcfe;
      }

      .id {
        color: #60708a;
        font-variant-numeric: tabular-nums;
      }

      .name {
        font-weight: 700;
      }

      .meta {
        color: #60708a;
        font-size: 0.9rem;
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 20px, 960px);
          margin: 20px auto;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        input {
          width: 100%;
        }

        .row {
          grid-template-columns: 64px 1fr;
        }

        .meta {
          display: none;
        }
      }
    </style>
    <script defer src="../dist/cdn.js"></script>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <main
      x-data="{
        query: '',
        rows: Array.from({ length: 50000 }, (_, index) => ({
          id: index + 1,
          name: `Customer ${String(index + 1).padStart(5, '0')}`,
          status: index % 3 === 0 ? 'Priority' : index % 3 === 1 ? 'Standard' : 'New'
        })),
        get filteredRows() {
          const query = this.query.trim().toLowerCase();
          if (!query) return this.rows;
          return this.rows.filter((row) => row.name.toLowerCase().includes(query));
        }
      }"
    >
      <h1>Alpine Virtual List</h1>
      <div class="toolbar">
        <input
          x-model.debounce.150ms="query"
          type="search"
          placeholder="Filter rows"
        />
        <div
          class="count"
          x-text="`${filteredRows.length.toLocaleString()} rows`"
        ></div>
      </div>

      <div
        class="list"
        x-virtual-list="{
          items: filteredRows,
          itemHeight: 54,
          overscan: 8,
          as: 'row',
          key: 'id'
        }"
      >
        <template>
          <div class="row">
            <span class="id" x-text="`#${row.id}`"></span>
            <span class="name" x-text="row.name"></span>
            <span class="meta" x-text="row.status"></span>
          </div>
        </template>
      </div>
    </main>
  </body>
</html>
